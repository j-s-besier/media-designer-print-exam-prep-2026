schema: spec-driven

context: |
  Domain: Vorbereitung auf die schriftliche Abschlusspruefung Sommer 2026
  fuer Mediengestalter Digital und Print, Fachrichtung Printmedien, nach
  der neuen Verordnung vom 15. Mai 2023.

  Projektkontext und Recherche liegen unter:
  - openspec/research/research.md
  - openspec/research/themen_printmedien_ap_sommer_2026.md

  Die schriftliche Pruefung besteht aus PB4 WiSo, PB2 Medien konzipieren,
  gestalten und praesentieren sowie PB3 Medien produzieren. PB1 ist Praxis
  und wird separat durch IHK/Pruefungsausschuss organisiert.

